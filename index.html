<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TANDEO Dashboard</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

<header class="header">

    <div>
        <h1>🏢 TANDEO DASHBOARD</h1>
        <div id="welcome"></div>
    </div>

    <div class="datetime">
        <div id="clock"></div>
        <div id="date"></div>
    </div>

</header>

<div class="search">
    <input
        type="text"
        placeholder="Mit Bing suchen ..."
        onkeypress="if(event.key==='Enter'){window.open('https://www.bing.com/search?q='+encodeURIComponent(this.value),'_blank')}">
</div>

<div class="grid">

    <div class="card">
        <h2>🇩🇪 Willich</h2>
        <div id="willich">Lade Wetter ...</div>
    </div>

    <div class="card">
        <h2>🇪🇸 Port d'Andratx</h2>
        <div id="andratx">Lade Wetter ...</div>
    </div>

    <div class="card">
        <h2>🛡 Administration</h2>

        <div class="links">

            <a href="https://admin.microsoft.com" target="_blank">Admin Center</a>
            <a href="https://entra.microsoft.com" target="_blank">Entra</a>

            <a href="https://intune.microsoft.com" target="_blank">Intune</a>
            <a href="https://security.microsoft.com" target="_blank">Defender</a>

            <a href="https://portal.azure.com" target="_blank">Azure</a>
            <a href="https://compliance.microsoft.com" target="_blank">Compliance</a>

            <a href="https://admin.exchange.microsoft.com" target="_blank">Exchange</a>
            <a href="https://admin.teams.microsoft.com" target="_blank">Teams Admin</a>

        </div>
    </div>

    <div class="card">
        <h2>⚡ Schnellzugriffe</h2>

        <div class="links">

            <a href="https://github.com" target="_blank">GitHub</a>
            <a href="https://onedrive.live.com" target="_blank">OneDrive</a>

            <a href="https://outlook.office.com" target="_blank">Outlook</a>
            <a href="https://teams.microsoft.com" target="_blank">Teams</a>

            <a href="https://powerbi.microsoft.com" target="_blank">Power BI</a>
            <a href="https://learn.microsoft.com" target="_blank">Microsoft Learn</a>

        </div>
    </div>

</div>

<script src="app.js"></script>

</body>
</html>

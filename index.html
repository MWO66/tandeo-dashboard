<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TANDEO Dashboard</title>

<style>
body{
    font-family:Segoe UI,Arial,sans-serif;
    margin:0;
    padding:20px;
    color:white;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0c4a6e);
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin-bottom:20px;
}

.search input{
    width:100%;
    padding:15px;
    border:none;
    border-radius:12px;
    font-size:16px;
    margin-bottom:20px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(350px,1fr));
    gap:20px;
}

.card{
    background:rgba(255,255,255,.08);
    border-radius:20px;
    padding:20px;
    backdrop-filter:blur(10px);
}

.card h2{
    margin-top:0;
    color:#7dd3fc;
}

.links{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.links a{
    background:#334155;
    color:white;
    text-decoration:none;
    padding:10px;
    border-radius:8px;
    text-align:center;
}

.links a:hover{
    background:#475569;
}

.weather-day{
    background:rgba(255,255,255,.06);
    margin-top:10px;
    padding:10px;
    border-radius:10px;
}

#clock{
    font-size:32px;
    font-weight:bold;
}
</style>
</head>

<body>

<div class="header">
    <h1>🏢 TANDEO DASHBOARD</h1>

    <div>
        <div id="clock"></div>
        <div id="date"></div>
    </div>
</div>

<div class="search">
<input
placeholder="Mit Bing suchen ..."
onkeypress="if(event.key==='Enter'){
window.open(
'https://www.bing.com/search?q='+encodeURIComponent(this.value),
'_blank'
)}">
</div>

<div class="grid">

<div class="card">
<h2>🇩🇪 Wetter Willich</h2>
<div id="willich">Lade Wetter...</div>
</div>

<div class="card">
<h2>🇪🇸 Wetter Port d'Andratx</h2>
<div id="andratx">Lade Wetter...</div>
</div>

<div class="card">
<h2>🛡 Administration</h2>

<div class="links">

<a href="https://admin.microsoft.com" target="_blank">Admin Center</a>
<a href="https://entra.microsoft.com" target="_blank">Entra</a>

<a href="https://intune.microsoft.com" target="_blank">Intune</a>
<a href="https://security.microsoft.com" target="_blank">Defender</a>

<a href="https://portal.azure.com" target="_blank">Azure</a>
<a href="https://compliance.microsoft.com" target="_blank">Compliance</a>

<a href="https://admin.exchange.microsoft.com" target="_blank">Exchange</a>
<a href="https://admin.teams.microsoft.com" target="_blank">Teams Admin</a>

</div>

</div>

<div class="card">
<h2>⚡ Schnellzugriffe</h2>

<div class="links">

<a href="https://github.com" target="_blank">GitHub</a>
<a href="https://onedrive.live.com" target="_blank">OneDrive</a>

<a href="https://outlook.office.com" target="_blank">Outlook</a>
<a href="https://teams.microsoft.com" target="_blank">Teams</a>

<a href="https://powerbi.microsoft.com" target="_blank">Power BI</a>
<a href="https://learn.microsoft.com" target="_blank">Microsoft Learn</a>

</div>

</div>

</div>

<script>

// Uhr

function updateClock(){

const now = new Date();

document.getElementById("clock").innerHTML =
now.toLocaleTimeString("de-DE");

document.getElementById("date").innerHTML =
now.toLocaleDateString("de-DE",{
weekday:"long",
day:"2-digit",
month:"long",
year:"numeric"
});

}

setInterval(updateClock,1000);
updateClock();


// Wetter

async function loadWeather(lat,lon,target){

try {

const response = await fetch(
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=3`
);

const data = await response.json();

let html = `
<p><b>Aktuell:</b> ${data.current.temperature_2m}°C</p>
<p>Luftfeuchtigkeit: ${data.current.relative_humidity_2m}%</p>
<p>Wind: ${data.current.wind_speed_10m} km/h</p>
`;

for(let i=0;i<3;i++){

html += `
<div class="weather-day">
<b>${data.daily.time[i]}</b><br>
⬆ ${data.daily.temperature_2m_max[i]}°C<br>
⬇ ${data.daily.temperature_2m_min[i]}°C
</div>`;
}

document.getElementById(target).innerHTML = html;

}
catch(error){

document.getElementById(target).innerHTML =
"Wetterdaten konnten nicht geladen werden.";

console.error(error);

}

}

loadWeather(51.26,6.55,"willich");
loadWeather(39.54,2.39,"andratx");

</script>

</body>
</html>

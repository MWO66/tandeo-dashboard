<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>TANDEO Dashboard</title>

<style>

:root{
    --primary:#0078d4;
    --bg:#0f172a;
    --card:rgba(255,255,255,.08);
    --border:rgba(255,255,255,.10);
    --text:white;
}

*{
    box-sizing:border-box;
    margin:0;
    padding:0;
}

body{
    font-family:Segoe UI,Arial,sans-serif;
    background:linear-gradient(135deg,#0f172a,#1e293b,#0c4a6e);
    color:var(--text);
    min-height:100vh;
    padding:30px;
}

.header{
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    margin-bottom:25px;
}

#clock{
    font-size:2rem;
    font-weight:600;
}

#date{
    opacity:.8;
}

.search{
    margin-bottom:25px;
}

.search input{
    width:100%;
    padding:18px;
    border:none;
    border-radius:16px;
    font-size:16px;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(400px,1fr));
    gap:20px;
}

.card{
    background:var(--card);
    backdrop-filter:blur(20px);
    border:1px solid var(--border);
    border-radius:24px;
    padding:20px;
}

.card h2{
    margin-bottom:15px;
    color:#7dd3fc;
}

.weather-day{
    margin-top:10px;
    padding:10px;
    background:rgba(255,255,255,.05);
    border-radius:10px;
}

.links{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:10px;
}

.links a{
    color:white;
    text-decoration:none;
    background:#334155;
    padding:12px;
    border-radius:10px;
    text-align:center;
}

.links a:hover{
    background:#475569;
}

.news a{
    display:block;
    color:white;
    text-decoration:none;
    margin:10px 0;
}

.news a:hover{
    color:#7dd3fc;
}

</style>
</head>

<body>

<div class="header">

<div>
<h1>🏢 TANDEO DASHBOARD</h1>
</div>

<div>
<div id="clock"></div>
<div id="date"></div>
</div>

</div>

<div class="search">

<input
type="text"
placeholder="Mit Bing suchen ..."
onkeypress="
if(event.key==='Enter'){
window.open(
'https://www.bing.com/search?q='+
encodeURIComponent(this.value),
'_blank'
);
}">
</div>

<div class="grid">

<div class="card">
<h2>🌤 Wetter Willich</h2>
<div id="willich">Lade Wetter...</div>
</div>

<div class="card">
<h2>☀️ Wetter Port d'Andratx</h2>
<div id="andratx">Lade Wetter...</div>
</div>

<div class="card">
<h2>🛡 Administration</h2>

<div class="links">

<a href="https://admin.microsoft.com" target="_blank">
Admin Center
</a>

<a href="https://entra.microsoft.com" target="_blank">
Entra
</a>

<a href="https://intune.microsoft.com" target="_blank">
Intune
</a>

<a href="https://security.microsoft.com" target="_blank">
Defender
</a>

<a href="https://portal.azure.com" target="_blank">
Azure
</a>

<a href="https://compliance.microsoft.com" target="_blank">
Compliance
</a>

</div>

</div>

<div class="card news">
<h2>📰 Nachrichten</h2>

<a target="_blank"
href="https://www.tagesschau.de">
🏛 Tagesschau
</a>

<a target="_blank"
href="https://www.handelsblatt.com">
💶 Handelsblatt
</a>

<a target="_blank"
href="https://www.kicker.de">
⚽ Kicker
</a>

<a target="_blank"
href="https://www.spiegel.de">
📰 SPIEGEL
</a>

</div>

</div>

<script>

function updateClock(){

const now = new Date();

document.getElementById('clock').innerHTML =
now.toLocaleTimeString('de-DE');

document.getElementById('date').innerHTML =
now.toLocaleDateString('de-DE',{
weekday:'long',
day:'2-digit',
month:'long',
year:'numeric'
});

}

setInterval(updateClock,1000);
updateClock();


async function weather(lat,lon,target){

try{

const url=
`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,relative_humidity_2m,wind_speed_10m&daily=temperature_2m_max,temperature_2m_min&forecast_days=3`;

const response=await fetch(url);
const data=await response.json();

let html=`
<p><b>Aktuell:</b> ${data.current.temperature_2m}°C</p>
<p>Luftfeuchtigkeit: ${data.current.relative_humidity_2m}%</p>
<p>Wind: ${data.current.wind_speed_10m} km/h</p>
`;

for(let i=0;i<3;i++){

html += `
<div class="weather-day">
<b>${data.daily.time[i]}</b><br>
⬆ ${data.daily.temperature_2m_max[i]}°C<br>
⬇ ${data.daily.temperature_2m_min[i]}°C
</div>
`;

}

document.getElementById(target).innerHTML=html;

}
catch(err){

document.getElementById(target).innerHTML=
"Wetterdaten nicht verfügbar";

}

}


weather(
51.26,
6.55,
"willich"
);

weather(
39.54,
2.39,
"andratx"
);

</script>

</body>
</html>
